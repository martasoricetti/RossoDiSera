<html lang="en">
<head>

                <h1 class="text-2xl font-bold text-red-600">RossoDiSera</h1>
           </div>

           <ul class="hidden md:flex items-center space-x-8 sm:pl-12">
               <li><a href="{% url 'weather_app:index' %}">Home</a></li>
               <li><a href="{% url 'weather_app:dashboard' %}">Dashboard</a></li>
           </ul>

           <a href="{% url 'login' %}"><button class="md:inline hidden bg-white hover:bg-gray-50 border border-gray-300 ml-20 px-9 py-2 rounded-full active:scale-95 transition-all">Account <i class="fa-solid fa-user"></i></button></a>

           <button aria-label="menu-btn" type="button" class="menu-btn inline-block md:hidden active:scale-90 transition">
               <svg xmlns="http://www.w3.org/2000/svg" width="30" height="30" viewBox="0 0 30 30">
                   <path d="M3 7a1 1 0 1 0 0 2h24a1 1 0 1 0 0-2zm0 7a1 1 0 1 0 0 2h24a1 1 0 1 0 0-2zm0 7a1 1 0 1 0 0 2h24a1 1 0 1 0 0-2z"/>
               </svg>
           </button>

           <div class="mobile-menu absolute top-[70px] left-0 w-full bg-white shadow-sm p-6 hidden md:hidden">
               <ul class="flex flex-col space-y-4 text-lg">
                   <li><a href="{% url 'weather_app:index' %}">Home</a></li>
                   <li><a href="{% url 'weather_app:dashboard' %}">Dashboard</a></li>
               </ul>

              <a href="{% url 'login' %}"><button type="button" class="bg-white text-gray-600 border border-gray-300 mt-6 text-sm hover:bg-gray-50 active:scale-95 transition-all w-40 h-11 rounded-full">
                   Log In
              </button></a>
           </div>
       </nav>
    </div>
    {% endblock core_header %}

    <!-- body -->
    {% block core_body %}
    {% endblock core_body %}

    <!-- footer -->
    {% block core_footer %}
    {% endblock core_footer %}

</body>
<script>
   const menuButtons = document.querySelectorAll('.menu-btn');
   const mobileMenus = document.querySelectorAll('.mobile-menu');

   menuButtons.forEach((btn, index) => {
       btn.addEventListener('click', () => {
           mobileMenus[index].classList.toggle('hidden');
       });
   });

</script>
</html>
