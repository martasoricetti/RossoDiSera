{% extends 'base.html' %}

{% block title %}RossoDiSera{% endblock %}

{% block core_body %}
{% load static %}
{% if user.is_authenticated %}
Hi {{ user.username }}!
<form action="{% url 'logout' %}" method="post">
  {% csrf_token %}
  <button type="submit" >Log Out</button>
</form>
{% else %}
<form method="post">
  {% csrf_token %}
  {{ form }}
  <button type="submit">Log In</button>
</form>
<a href="{% url 'signup' %}">Sign Up</a>
{% endif %}
{% endblock core_body %}
